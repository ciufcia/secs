name: secs-tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: get specific version of cmake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 3.24.3             # <--= optional, overrides the _latest_ version of CMake
        ninjaVersion: 1.11.1
    - name: run-tests
      uses: HorstBaerbel/action-ctest@1.1
      with:
        sourcedir: '.'
        builddir: 'build'
        cmakeoptions: '--config Release -DBUILD_TESTING=ON'
        ctestoptions: '-C Release' 
