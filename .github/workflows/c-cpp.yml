name: secs

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: run-tests
      uses: HorstBaerbel/action-ctest@1.1
      with:
        sourcedir: '.'
        builddir: 'build'
        cmakeoptions: '--config Release -DBUILD_TESTING=ON'
        ctestoptions: '-C Release' 
